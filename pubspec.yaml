name: welfare_app
description: India Government Welfare Schemes – native Android app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Localisation ──────────────────────────────────────────────
  flutter_localizations:
    sdk: flutter
  intl: 0.20.2

  # ── HTTP ──────────────────────────────────────────────────────
  dio: ^5.4.3+1

  # ── State management ─────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Local storage ─────────────────────────────────────────────
  shared_preferences: ^2.2.3

  # ── Navigation ────────────────────────────────────────────────
  go_router: ^13.2.1

  # ── Speech to text ────────────────────────────────────────────
  speech_to_text: 7.0.0

  # ── URL launcher ──────────────────────────────────────────────
  url_launcher: ^6.2.6

  # ── UI helpers ────────────────────────────────────────────────
  # Shimmer loading skeleton
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.9
  # Required for Riverpod code-gen (optional but listed for completeness)
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  # ── Localisation ──────────────────────────────────────────────
  generate: true
